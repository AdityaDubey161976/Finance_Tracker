spring:
  application:
    name: user-service
    
  datasource:
    url: jdbc:mysql://${MYSQLHOST}:${MYSQLPORT}/${MYSQLDATABASE}
    username: ${MYSQLUSER}
    password: ${MYSQLPASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver


  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        
server:
  port: ${PORT:8080}


eureka:
  client:
    service-url:
      defaultZone: https://financetracker-production-27e8.up.railway.app/eureka/


jwt:
  secret: ${JWT_SECRET}
  expiration: 86400000
